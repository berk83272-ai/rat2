<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI V48 | MOBILE</title>
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.23.0/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.23.0/ext-language_tools.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00d4ff; --admin: #00ff41; --danger: #ff003c;
            --bg: #020202; --panel: #0a0a0c; --border: #1f1f23;
            --text: #e0e0e0;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'Fira Code', monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 56px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 0 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            z-index: 100;
        }

        .logo { 
            font-family: 'Orbitron'; 
            font-size: 18px; 
            color: var(--primary); 
            letter-spacing: 2px;
        }

        .btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 12px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover { border-color: var(--primary); color: var(--primary); }
        .btn-run { background: var(--primary); color: #000; border: none; font-weight: bold; padding: 8px 16px; }
        .btn-admin { color: var(--admin); border-color: var(--admin); display: none; }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #editor-wrapper {
            flex: 1;
            position: relative;
            background: #000;
            min-height: 40vh;
        }

        #ace-editor {
            position: absolute;
            inset: 0;
            font-size: 14px !important;
        }

        #terminal-drawer {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 45%;
            background: rgba(0,0,0,0.96);
            border-top: 2px solid var(--primary);
            display: none;
            flex-direction: column;
            z-index: 200;
        }

        .term-head {
            background: #000;
            padding: 8px 12px;
            font-size: 11px;
            color: var(--primary);
            display: flex;
            justify-content: space-between;
        }

        #term-body {
            flex: 1;
            padding: 12px;
            font-size: 13px;
            color: var(--admin);
            overflow-y: auto;
        }

        .intelligence {
            background: var(--panel);
            border-top: 1px solid var(--border);
            max-height: 32vh;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 8px 12px;
            background: rgba(0,0,0,0.5);
            font-size: 11px;
            color: var(--primary);
            border-bottom: 1px solid var(--border);
        }

        .chat-stream {
            flex: 1;
            padding: 10px 12px;
            font-size: 12px;
            overflow-y: auto;
            line-height: 1.4;
        }

        .chat-input-area {
            padding: 8px 12px;
            border-top: 1px solid var(--border);
        }

        .flat-input {
            width: 100%;
            background: #111;
            border: 1px solid var(--border);
            color: white;
            padding: 8px 10px;
            font-size: 13px;
            border-radius: 4px;
        }

        footer {
            height: 32px;
            background: #000;
            border-top: 1px solid var(--border);
            padding: 0 12px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #555;
        }

        /* Overlord Panel - Mobile Friendly */
        #overlord-panel {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: none;
            flex-direction: column;
        }

        .ov-header {
            padding: 16px;
            background: rgba(0,255,65,0.1);
            border-bottom: 1px solid var(--admin);
            font-size: 18px;
            color: var(--admin);
            text-align: center;
            font-family: 'Orbitron';
        }

        .ov-grid {
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            overflow-y: auto;
            flex: 1;
        }

        .ov-card {
            background: #111;
            border: 1px solid #222;
            padding: 16px 12px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .ov-card:hover { border-color: var(--admin); background: rgba(0,255,65,0.08); }

        .ov-card i { font-size: 24px; margin-bottom: 8px; color: var(--admin); display: block; }

        .ov-card span { font-size: 12px; color: #aaa; }

        .ov-close {
            position: absolute;
            top: 16px; right: 16px;
            font-size: 24px;
            color: var(--danger);
            cursor: pointer;
        }

        /* Gate */
        #gate {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 999999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .gate-box {
            width: 100%;
            max-width: 360px;
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 24px 16px;
            border-radius: 8px;
        }

        /* Hide explorer on mobile */
        .explorer { display: none; }

        @media (min-width: 768px) {
            .explorer { display: block; width: 240px; background: var(--panel); border-right: 1px solid var(--border); padding: 16px; overflow-y: auto; }
            main { flex-direction: row; }
            .intelligence { width: 320px; border-left: 1px solid var(--border); border-top: none; max-height: none; }
            #editor-wrapper { flex: 1; min-height: auto; }
            .ov-grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
        }
    </style>
</head>
<body>

<div id="gate">
    <div class="gate-box">
        <h1 class="logo" style="text-align:center; font-size:38px; margin-bottom:24px;">OMNI V48</h1>
        <input type="text" id="uid" class="flat-input" placeholder="IDENTITY_ID" style="margin-bottom:12px;">
        <input type="password" id="ukey" class="flat-input" placeholder="SECURITY_KEY" style="margin-bottom:16px;">
        <button class="btn btn-run" style="width:100%; padding:12px; font-size:14px;" onclick="SystemKernel.boot()">ACCESS CORE</button>
    </div>
</div>

<header>
    <div class="logo">OMNIPOTENCE</div>
    <div style="display:flex; gap:8px; align-items:center;">
        <button id="admin-btn" class="btn btn-admin" onclick="UI.toggleOverlord(true)">OVERLORD</button>
        <select id="lang-select" class="btn" style="background:transparent; padding:6px 10px;">
            <option value="python">PYTHON</option>
            <option value="javascript">JS</option>
        </select>
        <button class="btn btn-run" onclick="SystemKernel.execute()">RUN</button>
    </div>
</header>

<main>
    <aside class="explorer">
        <!-- Dosya listesi masaüstünde görünür, mobilde gizli -->
        <div style="font-size:10px; color:#444; margin-bottom:12px;">FILES</div>
        <div class="file-item active" onclick="SystemKernel.loadFile('main.py', this)"><i class="fab fa-python"></i> main.py</div>
        <div class="file-item" onclick="SystemKernel.loadFile('config.json', this)"><i class="fas fa-cog"></i> config.json</div>
    </aside>

    <section id="editor-wrapper">
        <div id="ace-editor"></div>
        <div id="terminal-drawer">
            <div class="term-head">
                <span>OUTPUT</span>
                <span onclick="UI.toggleTerminal(false)" style="cursor:pointer">×</span>
            </div>
            <div id="term-body"></div>
        </div>
    </section>

    <aside class="intelligence">
        <div class="panel-header">GLOBAL CHAT</div>
        <div class="chat-stream" id="global-chat"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" class="flat-input" placeholder="Mesaj...">
        </div>
    </aside>
</main>

<!-- Overlord Panel -->
<div id="overlord-panel">
    <div class="ov-header">OVERLORD CORE <span class="ov-close" onclick="UI.toggleOverlord(false)">×</span></div>
    <div class="ov-grid">
        <div class="ov-card" onclick="Overlord.ghostMessage()">
            <i class="fas fa-mask"></i>
            <div>GHOST MSG</div>
            <span>Başka isimle yaz</span>
        </div>
        <div class="ov-card" onclick="Overlord.systemAlert()">
            <i class="fas fa-bullhorn"></i>
            <div>SYS ALERT</div>
            <span>Tümüne broadcast</span>
        </div>
        <div class="ov-card" onclick="Overlord.triggerGlitch()">
            <i class="fas fa-radiation"></i>
            <div>GLITCH</div>
            <span>Ekranı boz</span>
        </div>
        <div class="ov-card" onclick="Overlord.purgeDB()">
            <i class="fas fa-skull-crossbones"></i>
            <div>PURGE</div>
            <span>Chat temizle</span>
        </div>
    </div>
</div>

<footer>
    <span>● ONLINE</span>
    <span>ID: <span id="footer-user">GUEST</span></span>
    <span>V48</span>
</footer>

<script>
// Firebase
const fcfg = { 
    apiKey: "AIzaSyDpaFcKI6XhYuWCiyZHUFey0T6uqKy8IPA", 
    databaseURL: "https://prem-d18e3-default-rtdb.firebaseio.com" 
};
firebase.initializeApp(fcfg);
const db = firebase.database();

const editor = ace.edit("ace-editor");
editor.setTheme("ace/theme/terminal");
editor.session.setMode("ace/mode/python");
editor.setOptions({ fontSize: "14px", enableLiveAutocompletion: true });

const VFS = {
    'main.py': `print("OMNI V48 Mobile + Admin Ready.")`,
    'config.json': `{"version": "48-mobile-admin"}`
};

const SystemKernel = {
    py: null,
    user: "Guest",
    isRoot: false,
    async boot() {
        this.user = document.getElementById("uid").value.trim() || "User"+Math.floor(Math.random()*999);
        const key = document.getElementById("ukey").value;
        
        if(this.user === "@rw_f00t" && key === "f00t_99x_Root!") {
            this.isRoot = true;
            document.getElementById("admin-btn").style.display = "inline-block";
        }
        
        document.getElementById("gate").style.display = "none";
        document.getElementById("footer-user").innerText = this.user.toUpperCase();
        this.py = await loadPyodide();
        editor.setValue(VFS['main.py'], -1);
    },
    loadFile(name, el) {
        document.querySelectorAll('.file-item').forEach(i=>i.classList.remove('active'));
        el?.classList.add('active');
        editor.setValue(VFS[name] || "# Dosya içeriği", -1);
    },
    async execute() {
        UI.toggleTerminal(true);
        const out = document.getElementById("term-body");
        out.innerHTML = "> Çalıştırılıyor...\n";
        try {
            if(document.getElementById("lang-select").value === "python") {
                await this.py.runPythonAsync(editor.getValue());
                out.innerHTML += "→ Tamamlandı.";
            } else {
                eval(editor.getValue());
                out.innerHTML += "→ JS çalıştırıldı.";
            }
        } catch(e) {
            out.innerHTML += `<span style="color:#ff003c">[HATA] ${e.message}</span>`;
        }
    }
};

const Overlord = {
    ghostMessage() { alert("[GHOST] Bu fonksiyon Firebase ile entegre edilebilir."); },
    systemAlert() { alert("Global alert gönderildi! (simüle)"); },
    triggerGlitch() { document.body.style.animation = "glitch 1s"; setTimeout(()=>document.body.style.animation="",1000); },
    purgeDB() { if(confirm("Chat temizlensin mi?")) db.ref("v48_chat").remove(); }
};

const UI = {
    toggleTerminal(show) { document.getElementById("terminal-drawer").style.display = show ? "flex" : "none"; },
    toggleOverlord(show) { document.getElementById("overlord-panel").style.display = show ? "flex" : "none"; }
};

// Chat
document.getElementById("chat-input").onkeypress = e => {
    if(e.key === "Enter" && e.target.value.trim()) {
        db.ref("v48_chat").push({
            u: SystemKernel.user + (SystemKernel.isRoot ? " [ROOT]" : ""),
            m: e.target.value,
            t: Date.now()
        });
        e.target.value = "";
    }
};

db.ref("v48_chat").limitToLast(50).on("value", snap => {
    const box = document.getElementById("global-chat");
    box.innerHTML = "";
    snap.forEach(d => {
        const v = d.val();
        box.innerHTML += `<div><b style="color:\( {v.u.includes('[ROOT]') ? 'var(--admin)' : 'var(--primary)'}"> \){v.u}:</b> ${v.m}</div>`;
    });
    box.scrollTop = box.scrollHeight;
});

// Basit glitch animasyonu için (opsiyonel)
const style = document.createElement('style');
style.innerHTML = `
@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(-4px, 4px); }
  40% { transform: translate(4px, -4px); }
  60% { transform: translate(-4px, 0); }
  100% { transform: translate(0); }
}`;
document.head.appendChild(style);
</script>
</body>
        </html>
